# ======================================================
# ================= TMUX CONFIGURATION ================
# ======================================================

# Better prefix key (Ctrl+a instead of Ctrl+b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Reload config with r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Better pane splitting with intuitive keys
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"  # | for vertical split
bind - split-window -v -c "#{pane_current_path}"  # - for horizontal split

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D  
bind k select-pane -U
bind l select-pane -R

# Pane resizing with vim-like keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Mouse support (for beginners, can disable later)
set -g mouse on

# Don't rename windows automatically
set-option -g allow-rename off

# Start windows and panes at 1, not 0 (easier to reach)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 100000

# Faster key repetition
set -s escape-time 0

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Vi mode for copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection
bind-key -T copy-mode-vi 'Enter' send -X copy-selection-and-cancel
unbind-key -T copy-mode-vi MouseDragEnd1Pane

# Better window switching
bind -n S-Left previous-window
bind -n S-Right next-window

# ======================================================
# =================== APPEARANCE ======================
# ======================================================

# Enable true color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color*:Tc"

# Clipboard integration (OSC 52 for local and SSH)
set -g set-clipboard on
set -g allow-passthrough on
set -as terminal-features ',xterm*:clipboard'

# Status bar settings (layout only, colors handled by base16)
set -g status-interval 60
set -g status-left-length 30
set -g status-right-length 60

# Status bar content (colors will be handled by base16)
set -g status-left '#[fg=green][#S] '
set -g status-right '#[fg=yellow]#(whoami)@#H #[fg=cyan]%Y-%m-%d %H:%M'

# Window status format (colors handled by base16)
setw -g window-status-current-format ' #I:#W '
setw -g window-status-format ' #I:#W '

# ======================================================
# ================= USEFUL BINDINGS ===================
# ======================================================

# Quick session switching
bind S choose-session

# Kill session
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# Create new session
bind N command-prompt -p "New session name:" "new-session -s '%%'"

# Synchronize panes (type in all panes at once)
bind e setw synchronize-panes

# Pull last pane into current window
bind i join-pane -s !

# Smart clear: Alt-k clears screen+scrollback in shell, sends C-l in programs
is_shell="[ '#{pane_current_command}' = 'zsh' ] || [ '#{pane_current_command}' = 'bash' ]"
bind -n M-k if-shell "$is_shell" "send-keys -R ; clear-history" "send-keys C-l"

# ======================================================
# ===================== PLUGINS ========================
# ======================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tinted-theming/base16-tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'roosta/tmux-fuzzback'
set -g @plugin 'wfxr/tmux-fzf-url'

set -g @continuum-save-interval '15'
set -g @fuzzback-popup 1
set -g @fuzzback-popup-size '60%'

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
